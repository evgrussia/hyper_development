# Backend (Django API) — base-front.hyper-development.ru → localhost:8000
# Установка: sudo cp ... /etc/nginx/sites-available/ && sudo ln -sf ... sites-enabled/
# SSL: sudo certbot --nginx -d base-front.hyper-development.ru

upstream backend {
    server 127.0.0.1:8010;
    keepalive 64;
}

server {
    listen 80;
    server_name base-front.hyper-development.ru;
    location / {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
