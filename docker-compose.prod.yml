# Override для production на VPS (порты без конфликтов с другими проектами)
# Запуск: docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env up -d --build

services:
  frontend:
    ports:
      - "8085:80"
  backend:
    ports:
      - "8010:8000"
  db:
    ports: []   # не публикуем 5432 на host; backend ходит в db по внутренней сети
